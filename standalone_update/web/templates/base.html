<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Standalone Update{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <span class="nav-title">Standalone Update</span>
        <a href="{{ url_for('config') }}"
           {% if request.endpoint == 'config' %}class="active"{% endif %}>Configuration</a>
        <a href="{{ url_for('log_viewer') }}"
           {% if request.endpoint == 'log_viewer' %}class="active"{% endif %}>Update Log</a>
    </nav>
    <main>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
