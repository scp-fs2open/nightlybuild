# Standalone Update Web UI — nginx reverse proxy config
#
# Setup:
#   1. Replace 'your.domain.example' with your actual domain
#   2. Install to /etc/nginx/sites-available/standalone-update-web
#   3. Run certbot to obtain a certificate (see README)
#   4. ln -s /etc/nginx/sites-available/standalone-update-web /etc/nginx/sites-enabled/
#   5. nginx -t && systemctl reload nginx

# Limit login attempts to prevent brute force
limit_req_zone $binary_remote_addr zone=standalone_update_auth:10m rate=5r/m;

server {
    listen 80;
    listen [::]:80;
    server_name your.domain.example;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name your.domain.example;

    # TLS — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/your.domain.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your.domain.example/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # HTTP Basic Auth
    auth_basic "Standalone Update";
    auth_basic_user_file /etc/nginx/standalone-update-web.htpasswd;
    limit_req zone=standalone_update_auth burst=10 nodelay;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
